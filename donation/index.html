<!DOCTYPE html>
<html lang="ja">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-YDY73GL0WF"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag("js", new Date());

    gtag("config", "G-YDY73GL0WF");

<meta charset="UTF-8">
  <link rel="icon" href="/favicon.ico" sizes="any">
    <title>寄付フォーム</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="サポートホーム／ほっこりくろちゃんの寄付フォームです。単発寄付・継続寄付に対応しています。">
    <meta name="robots" content="index,follow">
    <link rel="canonical" href="https://kifukin.support-home.org/donation/">
    <link rel="stylesheet" href="/style.css">
    <style>
        .donation-hero {
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #fff6e6 0%, #ffd075 40%, #f28c28 100%);
        }

        .donation-hero .container {
            padding-top: 54px;
            padding-bottom: 54px;
        }

        .donation-hero h1 {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .donation-hero p {
            text-align: center;
            margin: 0 auto;
            max-width: 760px;
        }

        .donation-form-wrap {
            max-width: 760px;
            margin: 0 auto;
        }

        .donation-form {
            margin-top: 8px;
        }

        .form-label {
            display: block;
            margin-top: 16px;
            font-weight: 700;
            color: #3a2a1f;
        }

        .form-input,
        .form-select {
            width: 100%;
            padding: 12px 14px;
            margin-top: 8px;
            border: 1px solid #efdfc9;
            border-radius: 10px;
            background: #fff;
            font-size: 1rem;
        }

        .form-input:focus,
        .form-select:focus {
            outline: none;
            border-color: #f28c28;
            box-shadow: 0 0 0 3px rgba(242, 140, 40, 0.2);
        }

        .help-text {
            margin-top: 14px;
            font-size: 0.95rem;
            color: #5f4b3d;
        }

        .submit-row {
            margin-top: 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .submit-row .btn-donate {
            border: none;
            cursor: pointer;
        }

        .home-link {
            color: #e86b12;
            text-decoration: none;
            font-weight: 700;
        }

        .home-link:hover {
            text-decoration: underline;
        }

        .password-toggle {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            color: #3a2a1f;
            font-weight: 600;
        }

        .password-toggle input {
            width: auto;
            margin: 0;
            padding: 0;
        }

        .choice-row {
            display: flex;
            gap: 14px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .choice-row label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 0;
            font-weight: 600;
            color: #3a2a1f;
        }

        @media (max-width: 640px) {
            .donation-hero h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
<header class="donation-hero">
    <div class="light-rays"></div>
    <div class="container">
        <h1>寄付フォーム</h1>
        <p>ご支援ありがとうございます。必要事項をご入力のうえ送信してください。現金・振込は管理側確認後、クレジットカードは確認不要で受領書メールとPDFダウンロードをご利用いただけます。</p>
    </div>
</header>

<section class="section bg-light">
    <div class="container donation-form-wrap">
        <div class="card">
            <form class="donation-form" method="POST" action="/submit">
                <label class="form-label">
                    お名前
                    <input class="form-input" type="text" name="name" placeholder="匿名可">
                </label>
                <div class="form-label">
                    氏名の公表
                    <div class="choice-row">
                        <label><input type="radio" name="name_public_ok" value="1" required> 公表してよい</label>
                        <label><input type="radio" name="name_public_ok" value="0" required checked> 公表しない</label>
                    </div>
                </div>

                <label class="form-label">
                    メールアドレス
                    <input class="form-input" type="email" name="email" required>
                </label>

                <label class="form-label">
                    ログイン用パスワード（必須）
                    <input class="form-input" type="password" name="account_password" id="account-password" minlength="8" required placeholder="例: Abcd1234@" aria-describedby="password-rule">
                </label>
                <label class="password-toggle" for="show-account-password">
                    <input id="show-account-password" type="checkbox">
                    パスワードを表示
                </label>
                <p class="help-text" id="password-rule">8文字以上かつ「大文字・小文字・数字・記号」をすべて含めてください。</p>

                <label class="form-label">
                    郵便番号
                    <input class="form-input" type="text" name="postal_code" id="postal-code" required placeholder="例: 612-8403" inputmode="numeric" autocomplete="postal-code">
                </label>

                <label class="form-label">
                    ご住所
                    <input class="form-input" type="text" name="address" id="address" required placeholder="例: 京都市伏見区..." autocomplete="street-address">
                </label>

                <label class="form-label">
                    企業名（任意）
                    <input class="form-input" type="text" name="company" id="company" placeholder="例: 株式会社サンプル" autocomplete="organization">
                </label>

                <label class="form-label">
                    寄付金額（円）
                    <input class="form-input" type="number" name="amount" required min="1">
                </label>

                <label class="form-label">
                    寄付プラン
                    <select class="form-select" name="donation_plan" id="donation-plan">
                        <option value="one_time">今回のみ</option>
                        <option value="monthly">毎月（継続）</option>
                    </select>
                </label>

                <label class="form-label">
                    支払方法
                    <select class="form-select" name="payment_method" id="payment-method">
                        <option value="現金">現金</option>
                        <option value="振込">振込</option>
                        <option value="クレジットカード">クレジットカード</option>
                    </select>
                </label>

                <p class="help-text">送信後に確認ページが表示されます。現金・振込は管理側確認後、クレジットカードは確認不要で受領書メール送信・PDFダウンロードが有効になります。</p>
                <div class="submit-row">
                    <button class="btn-donate large" type="submit">寄付する</button>
                    <a class="home-link" href="/">トップページへ戻る</a>
                </div>
            </form>
        </div>
    </div>
</section>
<script>
  (function () {
    const plan = document.getElementById("donation-plan");
    const payment = document.getElementById("payment-method");
    const password = document.getElementById("account-password");
    const showAccountPassword = document.getElementById("show-account-password");
    const postalCode = document.getElementById("postal-code");
    const address = document.getElementById("address");
    if (!plan || !payment || !password) return;

    if (showAccountPassword) {
      showAccountPassword.addEventListener("change", function () {
        password.type = showAccountPassword.checked ? "text" : "password";
      });
    }

    function syncPlan() {
      if (plan.value === "monthly") {
        payment.value = "クレジットカード";
        Array.from(payment.options).forEach(function (option) {
          option.disabled = option.value !== "クレジットカード";
        });
        return;
      }
      Array.from(payment.options).forEach(function (option) {
        option.disabled = false;
      });
    }
    plan.addEventListener("change", syncPlan);
    syncPlan();

    if (postalCode && address) {
      let lookupTimer = null;
      let lastZipcode = "";

      async function fillAddressByZipcode() {
        const normalizedPostal = (postalCode.value || "")
          .replace(/[０-９]/g, function (ch) {
            return String.fromCharCode(ch.charCodeAt(0) - 0xFEE0);
          })
          .replace(/[ー−―‐ｰ－]/g, "-");
        const zipcode = normalizedPostal.replace(/[^0-9]/g, "");
        if (zipcode.length !== 7 || zipcode === lastZipcode) return;
        lastZipcode = zipcode;

        try {
          const res = await fetch("https://zipcloud.ibsnet.co.jp/api/search?zipcode=" + zipcode);
          const data = await res.json();
          if (!data || data.status !== 200 || !data.results || !data.results.length) return;
          const item = data.results[0];
          const fullAddress = (item.address1 || "") + (item.address2 || "") + (item.address3 || "");
          if (!address.value.trim()) {
            address.value = fullAddress;
          }
        } catch (_) {
          // Silent fallback: allow manual address input when API fails.
        }
      }

      postalCode.addEventListener("input", function () {
        if (lookupTimer) clearTimeout(lookupTimer);
        lookupTimer = setTimeout(fillAddressByZipcode, 400);
      });
      postalCode.addEventListener("blur", fillAddressByZipcode);
    }
  })();
</script>
</body>
</html>
